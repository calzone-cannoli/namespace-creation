---
controller_credential_types:
- name: TestKubeconfig
  inputs:
    fields:
      - id: kube_config
        type: string
        label: kubeconfig
        secret: true
        multiline: true
    required:
      - kube_config

  injectors:
    env:
      K8S_AUTH_KUBECONFIG: "{{ '{{ tower.filename.kubeconfig }}' }}"
    file:
      template.kubeconfig: "{{ '{{ kube_config }}' }}"
