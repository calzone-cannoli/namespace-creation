---
# =============================================================================
# RESOURCE QUOTAS BY T-SHIRT SIZE
# =============================================================================
# This file defines resource quotas for each t-shirt size and environment.
# Used by create_resourcequotas role to create ResourceQuota objects.
# =============================================================================

# Format: SIZE_ENV_FIELD: value
# Sizes: extra-small, small, medium, large
# Envs: nonprod (dev/qa/uat/poc), prod (stage/prod)

extra_small_request_cpu: 500m
extra_small_request_memory: 4Gi
extra_small_limit_cpu: 1000m
extra_small_limit_memory: 8Gi
extra_small_pods: 10
extra_small_services: 5

small_request_cpu: 1000m
small_request_memory: 8Gi
small_limit_cpu: 3000m
small_limit_memory: 16Gi
small_pods: 30
small_services: 10

medium_request_cpu: 3000m
medium_request_memory: 12Gi
medium_limit_cpu: 6000m
medium_limit_memory: 24Gi
medium_pods: 50
medium_services: 15

large_request_cpu: 6000m
large_request_memory: 16Gi
large_limit_cpu: 9000m
large_limit_memory: 32Gi
large_pods: 75
large_services: 15

extra_large_request_cpu: 9000m
extra_large_request_memory: 32Gi
extra_large_limit_cpu: 18000m
extra_large_limit_memory: 64Gi
extra_large_pods: 100
extra_large_services: 30
