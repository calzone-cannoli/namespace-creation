---
# Create Groups
- name: Create Admin Group
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: user.openshift.io/v1
      kind: Group
      metadata:
        name: "openshift.{{ tenant_id }}{{ item.env | lower }}.admin.users"
      users: null

- name: Create User Group
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: user.openshift.io/v1
      kind: Group
      metadata:
        name: "openshift.{{ tenant_id }}{{ item.env | lower }}.login.users"
      users: null

- name: Create Appsupport Group
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: user.openshift.io/v1
      kind: Group
      metadata:
        name: "openshift.{{ tenant_id }}{{ item.env | lower }}.appsupport.users"
      users: null