---
- name: Create namespaces
  hosts: localhost
  gather_facts: false
  tasks:
    #### Create namespace (TODO: role)
    - name: Create namespace
      loop: "{{ tenant_env }}"
      kubernetes.core.k8s:
        name: "{{ tenant_id }}-{{ item | lower }}"
        api_version: v1
        kind: Namespace
        state: present

    #### Print statements to check vars
    - name: Print out envs
      ansible.builtin.debug:
        var: tenant_env
    - name: Print out dev/qa size
      ansible.builtin.debug:
        var: nonprod_shirt_size
    - name: Print out stg/prod size
      ansible.builtin.debug:
        var: prod_shirt_size

    #### ResourceQuotas tasks file
    - name: ResourceQuotas
      ansible.builtin.include_tasks: tasks/create_resource_quotas.yml
      loop: "{{ tenant_env }}"

    #### Create RoleBindings (TODO: role)
    - name: Create RoleBindings for Dev/QA
      loop: "{{ tenant_env }}"
      when: item in ['Dev', 'QA']
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: admin-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: Group
            name: openshift.devops.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.middleware.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.dev.login.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}{{ item | lower }}.admin.users"
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}{{ item | lower }}.login.users"
            apiGroup: rbac.authorization.k8s.io
          - kind: User
            name: system:serviceaccount:ucd-agent:ucd
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: admin
            apiGroup: rbac.authorization.k8s.io
    - name: Create Admin RoleBinding for Stage
      loop: "{{ tenant_env }}"
      when: item == 'Stage'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: admin-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: User
            name: system:serviceaccount:ucd-agent:ucd
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.staging.admin.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}stage.admin.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: admin
            apiGroup: rbac.authorization.k8s.io
    - name: Create View RoleBinding for Stage
      loop: "{{ tenant_env }}"
      when: item == 'Stage'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: view-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: Group
            name: openshift.devops.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.middleware.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.staging.login.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}stage.login.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: view
            apiGroup: rbac.authorization.k8s.io
    - name: Create AppSupport RoleBinding for Stage
      loop: "{{ tenant_env }}"
      when: item == 'Stage'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: appsupport-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: Group
            name: "openshift.{{ tenant_id }}stage.appsupport.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: labcorp-app-support
            apiGroup: rbac.authorization.k8s.io
    - name: Create Admin RoleBinding for Prod
      loop: "{{ tenant_env }}"
      when: item == 'Prod'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: admin-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: User
            name: system:serviceaccount:ucd-agent:ucd
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}prod.admin.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: admin
            apiGroup: rbac.authorization.k8s.io
    - name: Create View RoleBinding for Prod
      loop: "{{ tenant_env }}"
      when: item == 'Prod'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: view-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: Group
            name: openshift.devops.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.middleware.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: openshift.prod.login.users
            apiGroup: rbac.authorization.k8s.io
          - kind: Group
            name: "openshift.{{ tenant_id }}prod.login.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: view
            apiGroup: rbac.authorization.k8s.io
    - name: Create AppSupport RoleBinding for Prod
      loop: "{{ tenant_env }}"
      when: item == 'Prod'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: appsupport-rb
            namespace: "{{ tenant_id }}-{{ item | lower }}"
          subjects:
          - kind: Group
            name: "openshift.{{ tenant_id }}prod.appsupport.users"
            apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: labcorp-app-support
            apiGroup: rbac.authorization.k8s.io

    #### Groups tasks file
    - name: Groups
      ansible.builtin.include_tasks: tasks/create_groups.yml
      loop: "{{ tenant_env }}"