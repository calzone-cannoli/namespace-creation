---
- name: Create namespaces
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        name: "{{ tenant_id }}"
        api_version: v1
        kind: Namespace
        state: present
    - name: Print out env
      ansible.builtin.debug:
        var: tenant_env
    - name: Print out size
      ansible.builtin.debug:
        var: tenant_shirt_size
    - name: Print out primary owner
      ansible.builtin.debug:
        var: primary_owner
    - name: Print out secondary owner
      ansible.builtin.debug:
        var: secondary_owner

    - name: Set size dq xs
      when: tenant_env in ['Dev', 'QA'] and tenant_shirt_size == "Extra Small"
      ansible.builtin.debug:
        msg: "Dev/QA XS"
    - name: Set size dq s
      when: tenant_env in ['Dev', 'QA'] and tenant_shirt_size == "Small"
      ansible.builtin.debug:
        msg: "Dev/QA S"
    - name: Set size dq m
      when: tenant_env in ['Dev', 'QA'] and tenant_shirt_size == "Medium"
      ansible.builtin.debug:
        msg: "Dev/QA M"
    - name: Set size dq l
      when: tenant_env in ['Dev', 'QA'] and tenant_shirt_size == "Large"
      ansible.builtin.debug:
        msg: "Dev/QA L"
    - name: Set size sp xs
      when: tenant_env in ['Stage', 'Prod'] and tenant_shirt_size == "Extra Small"
      ansible.builtin.debug:
        msg: "Stage/Prod XS"
    - name: Set size sp s
      when: tenant_env in ['Stage', 'Prod'] and tenant_shirt_size == "Small"
      ansible.builtin.debug:
        msg: "Stage/Prod S"
    - name: Set size sp m
      when: tenant_env in ['Stage', 'Prod'] and tenant_shirt_size == "Medium"
      ansible.builtin.debug:
        msg: "Stage/Prod M"
    - name: Set size sp l
      when: tenant_env in ['Stage', 'Prod'] and tenant_shirt_size == "Large"
      ansible.builtin.debug:
        msg: "Stage/Prod L"