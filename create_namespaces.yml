---
- name: Create namespaces
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Namespace
      ansible.builtin.include_role: 
        name: create_namespace
      loop: "{{ tenant_env }}"

    - name: ResourceQuotas
      ansible.builtin.include_role: 
        name: create_resourcequotas
      loop: "{{ tenant_env }}"

    - name: RoleBindings
      ansible.builtin.include_role: 
        name: create_rolebindings
      loop: "{{ tenant_env }}"

    - name: Groups
      ansible.builtin.include_role: 
        name: create_groups
      loop: "{{ tenant_env }}"