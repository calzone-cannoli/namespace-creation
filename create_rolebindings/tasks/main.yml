---
#### Create RoleBindings
- name: Dev/QA RoleBindings
  ansible.builtin.import_tasks: nonprod_rb.yml
  when: item in ['Dev', 'QA']
      
- name: Stage RoleBindings
  ansible.builtin.import_tasks: stage_rb.yml
  when: item == 'Stage'

- name: Prod RoleBindings
  ansible.builtin.import_tasks: prod_rb.yml
  when: item == 'Prod'