---
- name: Create Admin RoleBinding for Prod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: admin-rb
        namespace: "{{ item.name }}"
      subjects:
      - kind: User
        name: system:serviceaccount:ucd-agent:ucd
        apiGroup: rbac.authorization.k8s.io
      - kind: Group
        name: "openshift.{{ tenant_id }}prod.admin.users"
        apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: admin
        apiGroup: rbac.authorization.k8s.io
- name: Create View RoleBinding for Prod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: view-rb
        namespace: "{{ item.name }}"
      subjects:
      - kind: Group
        name: openshift.devops.users
        apiGroup: rbac.authorization.k8s.io
      - kind: Group
        name: openshift.middleware.users
        apiGroup: rbac.authorization.k8s.io
      - kind: Group
        name: openshift.prod.login.users
        apiGroup: rbac.authorization.k8s.io
      - kind: Group
        name: "openshift.{{ tenant_id }}prod.login.users"
        apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: view
        apiGroup: rbac.authorization.k8s.io
- name: Create AppSupport RoleBinding for Prod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: appsupport-rb
        namespace: "{{ item.name }}"
      subjects:
      - kind: Group
        name: "openshift.{{ tenant_id }}prod.appsupport.users"
        apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: labcorp-app-support
        apiGroup: rbac.authorization.k8s.io