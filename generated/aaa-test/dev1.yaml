---
# Namespace Definition (mirrors create_namespace role)
apiVersion: v1
kind: Namespace
metadata:
  name: "aaa-test-dev1"
  labels:
    tenant: "aaa-test"
    environment: "dev1"
    provisioned-by: ansible-automation-platform

---
# Resource Quota Definition
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resource-quota
  namespace: "aaa-test-dev1"
spec:
  hard:
    # NOTE: ResourceQuotas for each size are defined in vars/main.yml
    requests.cpu: "1000m"
    requests.memory: "8Gi"
    limits.cpu: "3000m"
    limits.memory: "16Gi"
    pods: "30"
    services: "10"

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.aaa-testdev1.admin.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.aaa-testdev1.login.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.aaa-testdev1.appsupport.users"
users: null

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rb
  namespace: "aaa-test-dev1"
subjects:
- kind: Group
  name: openshift.devops.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.middleware.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.dev.login.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.aaa-testdev1.admin.users"
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.aaa-testdev1.login.users"
  apiGroup: rbac.authorization.k8s.io
- kind: User
  name: system:serviceaccount:ucd-agent:ucd
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io

