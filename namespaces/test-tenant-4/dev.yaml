---
# Namespace Definition (mirrors create_namespace role)
apiVersion: v1
kind: Namespace
metadata:
  name: "test-tenant-4-dev"
  labels:
    tenant: "test-tenant-4"
    environment: "dev"
    provisioned-by: ansible-automation-platform

---
# Resource Quota Definition
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resource-quota
  namespace: "test-tenant-4-dev"
spec:
  hard:
    # NOTE: ResourceQuotas for each size are defined in vars/main.yml
    requests.cpu: "3000m"
    requests.memory: "12Gi"
    limits.cpu: "6000m"
    limits.memory: "24Gi"
    pods: "50"
    services: "15"

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4dev.admin.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4dev.login.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4dev.appsupport.users"
users: null

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rb
  namespace: "test-tenant-4-dev"
subjects:
- kind: Group
  name: openshift.devops.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.middleware.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.dev.login.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.test-tenant-4dev.admin.users"
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.test-tenant-4dev.login.users"
  apiGroup: rbac.authorization.k8s.io
- kind: User
  name: system:serviceaccount:ucd-agent:ucd
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io

