---
# Namespace Definition (mirrors create_namespace role)
apiVersion: v1
kind: Namespace
metadata:
  name: "test-tenant-4-prod"
  labels:
    tenant: "test-tenant-4"
    environment: "prod"
    provisioned-by: ansible-automation-platform

---
# Resource Quota Definition
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resource-quota
  namespace: "test-tenant-4-prod"
spec:
  hard:
    # NOTE: ResourceQuotas for each size are defined in vars/main.yml
    requests.cpu: "6000m"
    requests.memory: "16Gi"
    limits.cpu: "9000m"
    limits.memory: "32Gi"
    pods: "75"
    services: "15"

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4prod.admin.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4prod.login.users"
users: null

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: "openshift.test-tenant-4prod.appsupport.users"
users: null

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-rb
  namespace: "test-tenant-4-prod"
subjects:
- kind: User
  name: system:serviceaccount:ucd-agent:ucd
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.test-tenant-4prod.admin.users"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: view-rb
  namespace: "test-tenant-4-prod"
subjects:
- kind: Group
  name: openshift.devops.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.middleware.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: openshift.prod.login.users
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: "openshift.test-tenant-4prod.login.users"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: appsupport-rb
  namespace: "test-tenant-4-prod"
subjects:
- kind: Group
  name: "openshift.test-tenant-4prod.appsupport.users"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: labcorp-app-support
  apiGroup: rbac.authorization.k8s.io
