---
- name: Create namespaces
  hosts: localhost
  gather_facts: false
  # vars: #Collected from Survey
  #   tenant_env: []
  #   tenant_id: ""
  #   nonprod_shirt_size: ""
  #   prod_shirt_size: ""
  roles:
    - create_namespace
  post_tasks:
    - name: ResourceQuotas
      ansible.builtin.include_role: 
        name: create_resourcequotas
      loop: "{{ tenant_env }}"

    - name: RoleBindings
      ansible.builtin.include_role: 
        name: create_rolebindings
      loop: "{{ tenant_env }}"

    - name: Groups
      ansible.builtin.include_role: 
        name: create_groups
      loop: "{{ tenant_env }}"